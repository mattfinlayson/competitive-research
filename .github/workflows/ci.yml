name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-test:
    name: Lint, Test & Build
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint
        env:
          NO_ESLINT_CONFIG: true

      - name: Run tests
        run: npm run test:run

      - name: Run build
        run: npm run build

  test-cli-integration:
    name: CLI Integration Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test CLI - Domain Research
        run: |
          npm run cli -- "compliance software" | grep -q "Naming Research Report"
          echo "✅ CLI domain research works"

      - name: Test CLI - Named Candidates
        run: |
          npm run cli -- "compliance software" --names "Attest,Certify,Vouch" | grep -q "Finalists"
          echo "✅ CLI candidate evaluation works"

      - name: Test CLI - JSON Output
        run: |
          npm run cli -- "compliance software" --names "Attest" --format json | grep -q '"domain"'
          echo "✅ CLI JSON output works"

  validate-skill:
    name: Validate Skill Structure
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check SKILL.md exists
        run: |
          test -f skills/naming-research/SKILL.md && echo "✅ SKILL.md exists"

      - name: Check SKILL.md has frontmatter
        run: |
          head -1 skills/naming-research/SKILL.md | grep -q "^---" && echo "✅ SKILL.md has frontmatter"

      - name: Check SKILL.md line count
        run: |
          lines=$(wc -l < skills/naming-research/SKILL.md)
          if [ "$lines" -lt 500 ]; then
            echo "✅ SKILL.md is $lines lines (under 500)"
          else
            echo "❌ SKILL.md is $lines lines (exceeds 500)"
            exit 1
          fi

      - name: Check reference files exist
        run: |
          test -f skills/naming-research/references/archetypes.md && echo "✅ archetypes.md"
          test -f skills/naming-research/references/trademark.md && echo "✅ trademark.md"
          test -f skills/naming-research/references/linguistic.md && echo "✅ linguistic.md"
          test -f skills/naming-research/references/brand-fit.md && echo "✅ brand-fit.md"
          test -f skills/naming-research/references/emotional.md && echo "✅ emotional.md"
          test -f skills/naming-research/references/examples.md && echo "✅ examples.md"
